---
configuration:
  srat_update_channel:
    name: SRAT আপডেট চ্যানেল
    description: >-
      SRAT (Samba REST Administration Tool) কীভাবে আপডেট হবে তা বেছে নিন:
      none, release, prerelease বা develop.
  auto_update:
    name: স্বয়ংক্রিয় আপডেট
    description: >-
      নির্বাচিত আপডেট চ্যানেলে উপলব্ধ হলে স্বয়ংক্রিয়ভাবে SRAT আপডেট ডাউনলোড এবং
      ইনস্টল করুন। srat_update_channel 'none' ব্যতীত অন্য কিছুতে সেট করা প্রয়োজন।
  log_level:
    name: লগ স্তর
    description: >-
      অ্যাড-অন লগের বিশদ মাত্রা ঠিক করুন (trace, debug, info, notice, warning,
      error, fatal)।
  leave_front_door_open:
    name: SRAT প্রমাণীকরণ বন্ধ করুন
    description: >-
      সক্রিয় থাকলে ওয়েব ইন্টারফেস লগইন ছাড়াই প্রবেশযোগ্য। শুধুমাত্র বিশ্বস্ত
      নেটওয়ার্কে ব্যবহার করুন।
  disable_ipv6:
    name: IPv6 স্ট্যাক অক্ষম করুন
    description: >-
      সক্রিয় করা হলে (ডিফল্ট), এড-অন IPv6 অক্ষম করে এবং সেবাগুলিকে
      শুধুমাত্র IPv4 এ বাইন্ড করতে বাধ্য করে। IPv6 অনুমতি দিতে false সেট করুন।
  clean_upgrade_dir:
    name: আপগ্রেড ডিরেক্টরি পরিষ্কার করুন
    description: >-
      অ্যাড-অনের ডেটা ডিরেক্টরি থেকে সমস্ত ডাউনলোড করা SRAT বাইনারি আপডেট মুছে
      দেয়। শুধুমাত্র জরুরী পরিস্থিতিতে ব্যবহার করুন দূষিত আপডেট ফাইল পরিষ্কার
      করতে। এই কাজটি স্থায়ী এবং পূর্বাবস্থায় ফেরানো যায় না।
  factory_reset:
    name: ফ্যাক্টরি রিসেট
    description: >-
      ⚠️ বিপদ - ধ্বংসাত্মক ক্রিয়া ⚠️ SQL ডাটাবেস, সমস্ত কনফিগারেশন, সেটিংস এবং
      আপডেট ফাইল মুছে সম্পূর্ণ ফ্যাক্টরি রিসেট সম্পাদন করে। এটি স্থায়ীভাবে
      সমস্ত Samba শেয়ার কনফিগারেশন, ব্যবহারকারী অ্যাকাউন্ট, পাসওয়ার্ড এবং কাস্টম
      সেটিংস মুছে ফেলবে। অ্যাড-অন ডিফল্ট সেটিংস দিয়ে পুনরায় চালু হবে। এই
      ক্রিয়াটি অপরিবর্তনীয় এবং পূর্বাবস্থায় ফেরানো যাবে না। অত্যন্ত সতর্কতার
      সাথে ব্যবহার করুন।
  use_external_kernel_modules:
    name: বাহ্যিক কার্নেল মডিউল ব্যবহার করুন (পরীক্ষামূলক)
    description: >-
      ⚠️ পরীক্ষামূলক - শুধুমাত্র উন্নত ব্যবহারকারীদের জন্য ⚠️ সক্ষম হলে, https://github.com/dianlight/hasos_more_modules থেকে আপনার HAOS সংস্করণ এবং বোর্ডের সাথে মিলে এমন অতিরিক্ত কার্নেল মডিউল ডাউনলোড করে কার্নেলে লোড করে। প্রতিটি মডিউল /config/extra_modules-এ সংরক্ষিত একটি পৃথক .ko.xz ফাইল। ইতিমধ্যে ডাউনলোড করা মডিউলগুলি পুনরায় ব্যবহার করা হয়। অনুপস্থিত বা অসামঞ্জস্যপূর্ণ মডিউলগুলি একটি সতর্কতা তৈরি করে, ত্রুটি নয়।
network:
  3000/tcp: ওয়েব ইন্টারফেস (Home Assistant ছাড়া)
