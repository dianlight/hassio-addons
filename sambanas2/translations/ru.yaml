---
configuration:
  srat_update_channel:
    name: Канал обновлений SRAT
    description: >-
      Выберите, как SRAT (Samba REST Administration Tool) обновляется: none,
      release, prerelease или develop.
  auto_update:
    name: Автоматические обновления
    description: >-
      Автоматически загружать и устанавливать обновления SRAT, когда они доступны
      в выбранном канале обновлений. Требует, чтобы srat_update_channel был установлен
      на значение, отличное от 'none'.
  log_level:
    name: Уровень логирования
    description: >-
      Задайте подробность журналов аддона (trace, debug, info, notice, warning,
      error, fatal).
  leave_front_door_open:
    name: Отключить аутентификацию SRAT
    description: >-
      Если включено, веб-интерфейс доступен без входа. Используйте только в
      доверенных сетях.
  disable_ipv6:
    name: Отключить стек IPv6
    description: >-
      Когда включено (по умолчанию), дополнение отключает IPv6 и заставляет службы
      привязываться только к IPv4. Установите в false, чтобы разрешить IPv6.
  clean_upgrade_dir:
    name: Очистить каталог обновлений
    description: >-
      Удаляет все загруженные бинарные обновления SRAT из каталога данных аддона.
      Используйте только в чрезвычайных ситуациях для очистки поврежденных файлов
      обновлений. Это действие необратимо.
  factory_reset:
    name: Сброс до заводских настроек
    description: >-
      ⚠️ ОПАСНОСТЬ - РАЗРУШИТЕЛЬНОЕ ДЕЙСТВИЕ ⚠️ Выполняет полный сброс до заводских
      настроек, удаляя базу данных SQL, все конфигурации, настройки и файлы
      обновления. Это навсегда удалит все конфигурации общих папок Samba, учетные
      записи пользователей, пароли и пользовательские настройки. Дополнение
      перезапустится с настройками по умолчанию. Это действие необратимо и не может
      быть отменено. Используйте с крайней осторожностью.
  use_external_kernel_modules:
    name: Использовать внешние модули ядра (Экспериментально)
    description: >-
      ⚠️ ЭКСПЕРИМЕНТАЛЬНО - ТОЛЬКО ДЛЯ ОПЫТНЫХ ПОЛЬЗОВАТЕЛЕЙ ⚠️ При включении
      загружает дополнительные модули ядра с
      https://github.com/dianlight/hasos_more_modules, соответствующие версии HAOS и
      плате, и загружает их в ядро. Каждый модуль — отдельный файл .ko.xz, хранящийся
      в /config/extra_modules. Уже загруженные модули используются повторно.
      Отсутствующие или несовместимые модули генерируют предупреждение, а не ошибку.
network:
  3000/tcp: Веб-интерфейс (без Home Assistant)
