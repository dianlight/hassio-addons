---
configuration:
  srat_update_channel:
    name: ช่องอัปเดต SRAT
    description: >-
      เลือกวิธีที่ SRAT (Samba REST Administration Tool) อัปเดตตัวเอง: none,
      release, prerelease หรือ develop
  auto_update:
    name: การอัปเดตอัตโนมัติ
    description: >-
      ดาวน์โหลดและติดตั้งการอัปเดต SRAT โดยอัตโนมัติเมื่อมีในช่องทางการอัปเดตที่เลือก
      ต้องตั้งค่า srat_update_channel เป็นค่าอื่นที่ไม่ใช่ 'none'
  log_level:
    name: ระดับบันทึก
    description: >-
      ตั้งค่าระดับรายละเอียดของบันทึกส่วนเสริม (trace, debug, info, notice,
      warning, error, fatal)
  leave_front_door_open:
    name: ปิดการยืนยันตัวตน SRAT
    description: >-
      เมื่อเปิดใช้งาน อินเทอร์เฟซเว็บจะเข้าถึงได้โดยไม่ต้องล็อกอิน ใช้เฉพาะ
      บนเครือข่ายที่เชื่อถือได้
  disable_ipv6:
    name: ปิดการใช้งานสแตก IPv6
    description: >-
      เมื่อเปิดใช้งาน (ค่าเริ่มต้น) ส่วนเสริมจะปิดการใช้งาน IPv6 และบังคับให้บริการ
      ผูกเฉพาะกับ IPv4 เท่านั้น ตั้งค่าเป็น false เพื่ออนุญาต IPv6
  clean_upgrade_dir:
    name: ล้างไดเรกทอรีอัปเกรด
    description: >-
      ลบการอัปเดตไบนารี SRAT ที่ดาวน์โหลดทั้งหมดออกจากไดเรกทอรีข้อมูลของส่วนเสริม
      ใช้เฉพาะในสถานการณ์ฉุกเฉินเท่านั้นเพื่อล้างไฟล์อัปเดตที่เสียหาย การดำเนินการ
      นี้เป็นการถาวรและไม่สามารถยกเลิกได้
  factory_reset:
    name: รีเซ็ตเป็นค่าจากโรงงาน
    description: >-
      ⚠️ อันตราย - การกระทำที่ทำลายล้าง ⚠️ ดำเนินการรีเซ็ตเป็นค่าจากโรงงานอย่างสมบูรณ์โดย
      การลบฐานข้อมูล SQL การกำหนดค่าทั้งหมด การตั้งค่า และไฟล์อัปเดต สิ่งนี้จะลบ
      การกำหนดค่าการแชร์ Samba ทั้งหมด บัญชีผู้ใช้ รหัสผ่าน และการตั้งค่าที่กำหนดเอง
      อย่างถาวร ส่วนเสริมจะรีสตาร์ทด้วยการตั้งค่าเริ่มต้น การกระทำนี้ไม่สามารถย้อนกลับได้
      และไม่สามารถยกเลิกได้ ใช้ด้วยความระมัดระวังอย่างยิ่ง
  use_external_kernel_modules:
    name: ใช้โมดูลเคอร์เนลภายนอก (ทดลอง)
    description: >-
      ⚠️ ทดลอง - สำหรับผู้ใช้ขั้นสูงเท่านั้น ⚠️ เมื่อเปิดใช้งาน จะดาวน์โหลดโมดูลเคอร์เนลเพิ่มเติมจาก https://github.com/dianlight/hasos_more_modules ที่ตรงกับเวอร์ชัน HAOS และบอร์ดของคุณ แล้วโหลดลงในเคอร์เนล แต่ละโมดูลคือไฟล์ .ko.xz แยกต่างหากที่จัดเก็บใน /config/extra_modules โมดูลที่ดาวน์โหลดแล้วจะถูกนำมาใช้ซ้ำ โมดูลที่ขาดหายไปหรือเข้ากันไม่ได้จะสร้างคำเตือน ไม่ใช่ข้อผิดพลาด
network:
  3000/tcp: อินเทอร์เฟซเว็บ (ใช้โดยไม่มี Home Assistant)
