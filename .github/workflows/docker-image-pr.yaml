name: Docker Image CI - Build Release

on:
    pull_request:
        types: [ synchronize, ready_for_review ]
        branches: 
            - master
    workflow_dispatch:
        inputs:
          addon:
            description: 'Addon to build'     
            required: true
            default: 'sambanas'

permissions:
  pull-requests: write

env:
  REGISTRY: docker.io
  REGISTRY_PREFIX: docker.io/dianlight
  ARCHITECTURES: '["amd64", "aarch64"]'

jobs:
    init:
        if: github.event.pull_request.draft == false
        name: Initialize build
        runs-on: ubuntu-latest
        outputs:
          matrix: ${{ steps.matrix.outputs.matrix }}
          br_project: ${{ steps.extract_branch.outputs.BR_PROJECT }}
          version: ${{ steps.read_config.outputs.version }}
          name: ${{ steps.read_config.outputs.name }}
          description: ${{ steps.read_config.outputs.description }}
          image: ${{ steps.read_config.outputs.image }}

        steps:
        - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
          with:
                submodules: true

        - name: Extract branch name
          shell: bash
          run: |
              env
              if [ -z "${{ github.event.inputs.addon }}" ]; then
                if [ -z "${{ github.head_ref || github.ref_name }}" ]; then
                    export _GITHUB_REF=${GITHUB_REF}
                    echo "BR_VERSION from env ref ${_GITHUB_REF}"
                else
                    export _GITHUB_REF=${{ github.head_ref || github.ref_name }}
                    echo "BR_VERSION from github ref ${_GITHUB_REF}"
                fi
                echo "BR_VERSION=${_GITHUB_REF##*/}" | tee -a "$GITHUB_OUTPUT"
                echo "BR_PROJECT=$(TMP=${_GITHUB_REF##*/};echo ${TMP%%_*})" >> "$GITHUB_OUTPUT"
              else
                echo "BR_VERSION from event"  
                echo "BR_VERSION=${{ github.event.inputs.addon }}"  | tee -a "$GITHUB_OUTPUT"
                echo "BR_PROJECT=${{ github.event.inputs.addon }}"  | tee -a "$GITHUB_OUTPUT"
              fi
          id: extract_branch

        - name: 👓 read-yaml-file ${{ steps.extract_branch.outputs.BR_PROJECT }}/config.yaml
          uses: pietrobolcato/action-read-yaml@9f13718d61111b69f30ab4ac683e67a56d254e1d # 1.1.0
          id: read_config
          with:
            config: ${{ github.workspace }}/${{ steps.extract_branch.outputs.BR_PROJECT }}/config.yaml

        - name: Validate CHANGELOG.md and config.yaml version consistency
          shell: bash
          run: |
            ADDON_DIR="${{ steps.extract_branch.outputs.BR_PROJECT }}"
            CONFIG_FILE_PATH="./$ADDON_DIR/config.yaml"
            CHANGELOG_FILE_PATH="./$ADDON_DIR/CHANGELOG.md"

            CONFIG_VERSION="${{ steps.read_config_for_validation.outputs.version }}"

            echo "Addon directory: $ADDON_DIR"
            echo "Config file path: $CONFIG_FILE_PATH"
            echo "Changelog file path: $CHANGELOG_FILE_PATH"

            if [ -z "$CONFIG_VERSION" ]; then
              echo "Error: 'version' key not found or empty in $CONFIG_FILE_PATH."
              exit 1
            fi
            echo "Version from config.yaml: $CONFIG_VERSION"

            if [ ! -f "$CHANGELOG_FILE_PATH" ]; then
              echo "Error: $CHANGELOG_FILE_PATH not found."
              exit 1
            fi

            # Get the first line starting with '## ' and extract the version.
            # Handles '## 1.2.3', '## [1.2.3]', '## v1.2.3', '## [v1.2.3]', including pre-release suffixes.
            CHANGELOG_VERSION_LINE=$(grep -m 1 '^## ' "$CHANGELOG_FILE_PATH")
            if [ -z "$CHANGELOG_VERSION_LINE" ]; then
              echo "Error: No version line found in $CHANGELOG_FILE_PATH (expected a line starting with '## ' like '## 1.2.3')."
              exit 1
            fi
            CHANGELOG_VERSION=$(echo "$CHANGELOG_VERSION_LINE" | sed -E -n 's/^##\s*\[?v?([0-9]+\.[0-9]+\.[0-9]+[^]\s]*)\]?.*/\1/p')

            if [ -z "$CHANGELOG_VERSION" ]; then
              echo "Error: Could not extract version from CHANGELOG.md line: $CHANGELOG_VERSION_LINE"
              echo "Expected format like '## 1.2.3' or '## [v1.2.3]' or '## 1.2.3-beta1'."
              exit 1
            fi
            echo "Latest version from $CHANGELOG_FILE_PATH: $CHANGELOG_VERSION"

            if [ "$CONFIG_VERSION" == "$CHANGELOG_VERSION" ]; then
              echo "Versions match: config.yaml ($CONFIG_VERSION) and CHANGELOG.md ($CHANGELOG_VERSION)."
            else
              echo "Error: Version mismatch!"
              echo "config.yaml version: $CONFIG_VERSION"
              echo "CHANGELOG.md version: $CHANGELOG_VERSION"
              exit 1
            fi


        - name: Get build matrix
          id: matrix
          uses: home-assistant/builder/actions/prepare-multi-arch-matrix@62a1597b84b3461abad9816d9cd92862a2b542c3 # 2026.03.2
          with:
            architectures: ${{ env.ARCHITECTURES }}
            image-name: addon-${{ steps.extract_branch.outputs.BR_PROJECT }}
            registry-prefix: ${{ env.REGISTRY_PREFIX }}

    build:
        name: Build ${{ matrix.arch }} image
        needs: init
        if: needs.init.outputs.image != ''
        runs-on: ${{ matrix.os }}
        permissions:
          contents: read
          id-token: write
          packages: write
        strategy:
          fail-fast: false
          matrix: ${{ fromJSON(needs.init.outputs.matrix) }}

        steps:
        - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
          with:
                submodules: true

        - name: Read BUILD_FROM for ${{ matrix.arch }}
          id: build_from
          shell: bash
          run: |
            BUILD_FROM=$(yq -r '.build_from.${{ matrix.arch }}' ${{ needs.init.outputs.br_project }}/build.yaml)
            echo "value=${BUILD_FROM}" >> "$GITHUB_OUTPUT"

        - name: Publish ${{ needs.init.outputs.br_project }} Addon ${{ needs.init.outputs.version }}
          uses: home-assistant/builder/actions/build-image@62a1597b84b3461abad9816d9cd92862a2b542c3 # 2026.03.2
          with:
            arch: ${{ matrix.arch }}
            container-registry: ${{ env.REGISTRY }}
            container-registry-username: ${{ secrets.DOCKERHUB_USERNAME }}
            container-registry-password: ${{ secrets.DOCKERHUB_TOKEN }}
            image: ${{ matrix.image }}
            image-tags: |
              ${{ needs.init.outputs.version }}
              latest
            push: "true"
            version: ${{ needs.init.outputs.version }}
            context: ${{ needs.init.outputs.br_project }}
            build-args: |
              BUILD_FROM=${{ steps.build_from.outputs.value }}
              BUILD_NAME=${{ needs.init.outputs.name }}
              BUILD_DESCRIPTION=${{ needs.init.outputs.description }}
              BUILD_REF=${{ github.sha }}
              BUILD_REPOSITORY=${{ github.repository }}
            cosign-identity: https://github.com/${{ github.repository }}/.*

    manifest:
        name: Publish multi-arch manifest
        needs: [init, build]
        if: needs.init.outputs.image != ''
        runs-on: ubuntu-latest
        permissions:
          id-token: write
          packages: write

        steps:
        - name: Publish multi-arch manifest
          uses: home-assistant/builder/actions/publish-multi-arch-manifest@62a1597b84b3461abad9816d9cd92862a2b542c3 # 2026.03.2
          with:
            architectures: ${{ env.ARCHITECTURES }}
            container-registry: ${{ env.REGISTRY }}
            container-registry-username: ${{ secrets.DOCKERHUB_USERNAME }}
            container-registry-password: ${{ secrets.DOCKERHUB_TOKEN }}
            image-name: addon-${{ needs.init.outputs.br_project }}
            image-tags: |
              ${{ needs.init.outputs.version }}
              latest
            registry-prefix: ${{ env.REGISTRY_PREFIX }}
            cosign: https://github.com/${{ github.repository }}/.*
