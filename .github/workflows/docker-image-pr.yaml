name: Docker Image CI - Build Release

on:
    pull_request:
        types: [ opened, synchronize, ready_for_review ]
        branches:
            - master
    workflow_dispatch:
        inputs:
          addon:
            description: 'Addon to build'
            required: true
            default: 'sambanas'

permissions:
  pull-requests: write
  packages: write
  id-token: write

jobs:
    setup:
        name: Prepare
        if: github.event.pull_request.draft == false
        runs-on: ubuntu-latest
        outputs:
          build_matrix: ${{ steps.matrix.outputs.matrix }}
          architectures: ${{ steps.extract_archs.outputs.architectures }}
          image_name: ${{ steps.extract_archs.outputs.image_name }}
          version: ${{ steps.read_config.outputs.version }}
          addon_dir: ${{ steps.extract_branch.outputs.BR_PROJECT }}
          name: ${{ steps.read_config.outputs.name }}
          description: ${{ steps.read_config.outputs.description }}
          build_from: ${{ steps.extract_build_from.outputs.BUILD_FROM }}
          has_addon: ${{ steps.check_addon.outputs.has_addon }}
        steps:
        - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
          with:
                submodules: true

        - name: Extract branch name
          shell: bash
          run: |
              if [ -z "${{ github.event.inputs.addon }}" ]; then
                if [ -z "${{ github.head_ref || github.ref_name }}" ]; then
                    export _GITHUB_REF=${GITHUB_REF}
                    echo "BR_VERSION from env ref ${_GITHUB_REF}"
                else
                    export _GITHUB_REF=${{ github.head_ref || github.ref_name }}
                    echo "BR_VERSION from github ref ${_GITHUB_REF}"
                fi
                echo "BR_VERSION=${_GITHUB_REF##*/}" | tee -a "$GITHUB_OUTPUT"
                echo "BR_PROJECT=$(TMP=${_GITHUB_REF##*/};echo ${TMP%%_*})" >> "$GITHUB_OUTPUT"
              else
                echo "BR_VERSION from event"
                echo "BR_VERSION=${{ github.event.inputs.addon }}"  | tee -a "$GITHUB_OUTPUT"
                echo "BR_PROJECT=${{ github.event.inputs.addon }}"  | tee -a "$GITHUB_OUTPUT"
              fi
          id: extract_branch

        - name: Check addon directory exists
          id: check_addon
          shell: bash
          run: |
            BR_PROJECT="${{ steps.extract_branch.outputs.BR_PROJECT }}"
            if [ -f "${BR_PROJECT}/config.yaml" ]; then
              echo "has_addon=true" >> "$GITHUB_OUTPUT"
              echo "Addon directory found: ${BR_PROJECT}"
            else
              echo "has_addon=false" >> "$GITHUB_OUTPUT"
              echo "No addon directory for '${BR_PROJECT}' — skipping addon-specific steps (non-addon branch)"
            fi

        - name: Read config.yaml version for validation
          id: read_config
          if: steps.check_addon.outputs.has_addon == 'true'
          uses: pietrobolcato/action-read-yaml@9f13718d61111b69f30ab4ac683e67a56d254e1d # 1.1.0
          with:
            config: ./${{ steps.extract_branch.outputs.BR_PROJECT }}/config.yaml

        - name: Validate CHANGELOG.md and config.yaml version consistency
          if: steps.check_addon.outputs.has_addon == 'true'
          shell: bash
          run: |
            ADDON_DIR="${{ steps.extract_branch.outputs.BR_PROJECT }}"
            CONFIG_FILE_PATH="./$ADDON_DIR/config.yaml"
            CHANGELOG_FILE_PATH="./$ADDON_DIR/CHANGELOG.md"

            CONFIG_VERSION="${{ steps.read_config.outputs.version }}"

            echo "Addon directory: $ADDON_DIR"
            echo "Config file path: $CONFIG_FILE_PATH"
            echo "Changelog file path: $CHANGELOG_FILE_PATH"

            if [ -z "$CONFIG_VERSION" ]; then
              echo "Error: 'version' key not found or empty in $CONFIG_FILE_PATH."
              exit 1
            fi
            echo "Version from config.yaml: $CONFIG_VERSION"

            if [ ! -f "$CHANGELOG_FILE_PATH" ]; then
              echo "Error: $CHANGELOG_FILE_PATH not found."
              exit 1
            fi

            CHANGELOG_VERSION_LINE=$(grep -m 1 '^## ' "$CHANGELOG_FILE_PATH")
            if [ -z "$CHANGELOG_VERSION_LINE" ]; then
              echo "Error: No version line found in $CHANGELOG_FILE_PATH (expected a line starting with '## ' like '## 1.2.3')."
              exit 1
            fi
            CHANGELOG_VERSION=$(echo "$CHANGELOG_VERSION_LINE" | sed -E -n 's/^##[[:space:]]*\[?v?([0-9]+\.[0-9]+\.[0-9]+[^][:space:]]*)\]?.*/\1/p')

            if [ -z "$CHANGELOG_VERSION" ]; then
              echo "Error: Could not extract version from CHANGELOG.md line: $CHANGELOG_VERSION_LINE"
              echo "Expected format like '## 1.2.3' or '## [v1.2.3]' or '## 1.2.3-beta1'."
              exit 1
            fi
            echo "Latest version from $CHANGELOG_FILE_PATH: $CHANGELOG_VERSION"

            if [ "$CONFIG_VERSION" == "$CHANGELOG_VERSION" ]; then
              echo "Versions match: config.yaml ($CONFIG_VERSION) and CHANGELOG.md ($CHANGELOG_VERSION)."
            else
              echo "Error: Version mismatch!"
              echo "config.yaml version: $CONFIG_VERSION"
              echo "CHANGELOG.md version: $CHANGELOG_VERSION"
              exit 1
            fi

        - name: Extract arch list
          id: extract_archs
          if: steps.check_addon.outputs.has_addon == 'true'
          shell: bash
          run: |
            ADDON_DIR="${{ steps.extract_branch.outputs.BR_PROJECT }}"
            ARCHS=$(yq e '.arch | @json' "${ADDON_DIR}/config.yaml")
            echo "architectures=${ARCHS}" >> "$GITHUB_OUTPUT"
            echo "image_name=addon-${ADDON_DIR}" >> "$GITHUB_OUTPUT"
            echo "Architectures: ${ARCHS}"

        - name: Extract BUILD_FROM
          id: extract_build_from
          if: steps.check_addon.outputs.has_addon == 'true'
          shell: bash
          run: |
            ADDON_DIR="${{ steps.extract_branch.outputs.BR_PROJECT }}"
            BUILD_FROM=$(grep -m1 'ARG BUILD_FROM=' "${ADDON_DIR}/Dockerfile" | cut -d= -f2-)
            echo "BUILD_FROM=${BUILD_FROM}" >> "$GITHUB_OUTPUT"
            echo "BUILD_FROM: ${BUILD_FROM}"

        - name: Prepare multi-arch matrix
          id: matrix
          if: steps.check_addon.outputs.has_addon == 'true'
          uses: home-assistant/builder/actions/prepare-multi-arch-matrix@62a1597b84b3461abad9816d9cd92862a2b542c3 # 2026.03.2
          with:
            architectures: ${{ steps.extract_archs.outputs.architectures }}
            image-name: ${{ steps.extract_archs.outputs.image_name }}
            registry-prefix: ghcr.io/dianlight

    build:
        name: Build ${{ matrix.arch }}
        needs: setup
        if: needs.setup.outputs.has_addon == 'true'
        runs-on: ${{ matrix.os }}
        strategy:
          fail-fast: false
          matrix: ${{ fromJSON(needs.setup.outputs.build_matrix) }}
        steps:
        - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
          with:
                submodules: true
                persist-credentials: false

        - name: Build image
          uses: home-assistant/builder/actions/build-image@62a1597b84b3461abad9816d9cd92862a2b542c3 # 2026.03.2
          with:
                arch: ${{ matrix.arch }}
                container-registry-password: ${{ secrets.GITHUB_TOKEN }}
                context: ./${{ needs.setup.outputs.addon_dir }}
                image: ${{ matrix.image }}
                image-tags: |
                  ${{ needs.setup.outputs.version }}
                  latest
                labels: |
                  io.hass.type=app
                  io.hass.name=${{ needs.setup.outputs.name }}
                  io.hass.description=${{ needs.setup.outputs.description }}
                build-args: BUILD_FROM=${{ needs.setup.outputs.build_from }}
                push: true
                version: ${{ needs.setup.outputs.version }}

    manifest:
        name: Publish multi-arch manifest
        needs: [setup, build]
        if: needs.setup.outputs.has_addon == 'true'
        runs-on: ubuntu-latest
        steps:
        - name: Publish multi-arch manifest
          uses: home-assistant/builder/actions/publish-multi-arch-manifest@62a1597b84b3461abad9816d9cd92862a2b542c3 # 2026.03.2
          with:
                architectures: ${{ needs.setup.outputs.architectures }}
                container-registry-password: ${{ secrets.GITHUB_TOKEN }}
                image-name: ${{ needs.setup.outputs.image_name }}
                image-tags: |
                  ${{ needs.setup.outputs.version }}
                  latest
                registry-prefix: ghcr.io/dianlight
